server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index pages/index.html;

    location / {
        try_files $uri $uri/ /pages/index.html;
    }

    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}