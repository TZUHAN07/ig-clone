<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram-Clone</title>
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/index.css" />
    <link rel="stylesheet" href="../assets/css/sidebar.css">
  </head>
  <body>
    <div class="sidebar-container"></div>
    <main class="main-content">
      <div class="container">
        <div class="reel-story"></div>
        <div class="post-list"></div>
      </div>

      <div class="modal-overlay hidden" id="create-modal">
        <div class="create-post">
          <div class="new-post-header">
            <span class="header-text">Create new post</span>
            <button class="close-btn" id="close-modal">✕</button>
          </div>

          <div class="post-body">
            <div class="post-image-area">
              <img id="image-preview" src="" alt="" class="hidden" />
              <label for="image-input" class="upload-label">
                <span>Select from computer</span>
              </label>
              <input
                type="file"
                id="image-input"
                accept="image/*"
                class="hidden"
              />
            </div>

            <div class="post-info">
              <textarea
                id="post-caption"
                placeholder="say something..."
              ></textarea>
            </div>
          </div>

          <div class="new-post-footer">
            <button class="share-btn" id="share-btn">Share</button>
          </div>
        </div>
      </div>
    </main>
    <div class="aside-content"></div>
    <script src="../config.js"></script>
    <script src="../src/utils/storage.js"></script>
    <script src="../src/utils/helpers.js"></script>
    <script src="../src/api/postApi.js"></script>
    <script src="../src/api/avatarApi.js"></script>
    <script src="../src/api/userApi.js"></script>
    <script src="../src/components/sidebar.js"></script>
    <script src="../src/components/postcard.js"></script>
    <!-- <script src="../src/components/avatar.js"></script> -->
    <script src="../src/components/suggestcard.js"></script>
    <script src="../src/page/index.js"></script>
  </body>
</html>
