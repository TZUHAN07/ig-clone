<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram-Clone</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/sidebar.css" />
    <link rel="stylesheet" href="../assets/css/profile.css">
    <link rel="stylesheet" href="../assets/css/comment.css">
</head>
<body>
    <div class="sidebar-container">
    </div>
    <main class="profile-container">
        <div class="profile-header">
            <img class="profile-avatar"/>
            <div class="profile-info">
            <span class="profile-username"></span>
            <div class="profile-numbers">

            <div class="profile-stat">
                <strong class="stat-count"></strong>
                <span class="stat-label">posts</span>
            </div>

            <div class="profile-stat">
                <strong class="stat-count"></strong>
                 <span class="stat-label">followers</span>
            </div>
        
            <div class="profile-stat">
                 <strong class="stat-count"></strong>
                <span class="stat-label">following</span>
            </div>

            </div>
            </div>
        </div>
        <button class="click-btn" id="profile-btn"></button>
        <div class="profile-list">
           
        </div>
    </main>
    <script src="../config.js"></script>
    <script src="../src/utils/storage.js"></script>
    <script src="../src/utils/helpers.js"></script>
    <script src="../src/api/postApi.js"></script>
    <script src="../src/api/commentApi.js"></script>
    <script src="../src/api/avatarApi.js"></script>
    <script src="../src/api/userApi.js"></script>
    <script src="../src/api/profileApi.js"></script>
    <script src="../src/components/sidebar.js"></script>
    <script src="../src/components/commentModal.js"></script>
    <script src="../src/page/profile.js"></script>
    
</body>
</html>
